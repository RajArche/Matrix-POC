<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChatPOC — Codebase Architecture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: #161b27;
    border-bottom: 1px solid #2d3748;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    z-index: 100;
  }

  #toolbar h1 {
    font-size: 14px;
    font-weight: 600;
    color: #a78bfa;
    letter-spacing: 0.02em;
  }

  .tb-sep { width: 1px; height: 24px; background: #2d3748; }

  .tb-btn {
    background: #1e2535;
    border: 1px solid #2d3748;
    color: #94a3b8;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
  }
  .tb-btn:hover { background: #283047; color: #e2e8f0; border-color: #4a5568; }

  .legend {
    display: flex;
    gap: 14px;
    margin-left: auto;
    align-items: center;
    font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; color: #94a3b8; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  #canvas-wrap {
    position: fixed;
    top: 48px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-wrap.panning { cursor: grabbing; }

  #svg-root {
    width: 3200px;
    height: 2400px;
    transform-origin: 0 0;
    user-select: none;
  }

  /* ── tooltip ── */
  #tooltip {
    position: fixed;
    background: #1e2535;
    border: 1px solid #4a5568;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
    max-width: 300px;
    pointer-events: none;
    display: none;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  #tooltip strong { color: #a78bfa; display: block; margin-bottom: 4px; font-size: 13px; }
  #tooltip .path { color: #64748b; font-family: monospace; font-size: 10px; margin-top: 4px; }

  /* ── node styles ── */
  .node-group { cursor: pointer; }

  .node-rect {
    rx: 10px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.4));
    transition: filter .2s;
  }
  .node-group:hover .node-rect {
    filter: drop-shadow(0 6px 20px rgba(167,139,250,.3));
  }

  .node-title {
    font-size: 13px;
    font-weight: 700;
    fill: #f1f5f9;
    dominant-baseline: middle;
  }
  .node-subtitle {
    font-size: 10px;
    fill: #94a3b8;
    dominant-baseline: middle;
  }
  .node-badge {
    font-size: 9px;
    fill: #cbd5e1;
    dominant-baseline: middle;
    font-family: monospace;
  }

  .layer-label {
    font-size: 11px;
    font-weight: 700;
    fill: #475569;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    dominant-baseline: middle;
  }

  .edge {
    fill: none;
    stroke-width: 1.5;
    opacity: .55;
  }
  .edge-label {
    font-size: 9px;
    fill: #64748b;
    dominant-baseline: middle;
  }

  /* section backgrounds */
  .section-bg {
    fill: none;
    stroke-width: 1;
    stroke-dasharray: 6 4;
    rx: 16px;
    opacity: .35;
  }

  .arrow-marker { overflow: visible; }
</style>
</head>

  'sidebar-menu':   { title: 'SidebarMenu.jsx', path: 'src/features/chat/components/SidebarMenu/SidebarMenu.jsx', desc: 'Navigation sidebar using Ant Design icons.' },
  'create-group':   { title: 'CreateGroupModal.jsx', path: 'src/features/chat/components/CreateGroupModal/CreateGroupModal.jsx', desc: 'Modal for creating a new Matrix group room.' },
  'invite-modal':   { title: 'InviteMemberModal.jsx', path: 'src/features/chat/components/InviteMemberModal/InviteMemberModal.jsx', desc: 'Modal for inviting a user to a Matrix room.' },
  'member-drawer':  { title: 'MemberListDrawer.jsx', path: 'src/features/chat/components/MemberListDrawer/MemberListDrawer.jsx', desc: 'Ant Design Drawer showing the member list of the active room.' },
  'use-matrix-init':{ title: 'useMatrixInit.js', path: 'src/features/chat/hooks/useMatrixInit.js', desc: 'Core orchestration hook. Spawns matrixWorker and sqliteWorkerRouter. Receives postMessage events from workers and dispatches Redux actions (setRooms, pushMessage, setMembers, etc.).' },

// Pan & zoom
const wrap = document.getElementById('canvas-wrap');
const svg  = document.getElementById('svg-root');
let scale = 0.55, tx = 60, ty = 20;
let panning = false, startX, startY, startTx, startTy;

function applyTransform() {
  svg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}
applyTransform();

function zoom(factor) {
  const cx = wrap.clientWidth  / 2;
  const cy = wrap.clientHeight / 2;
  tx = cx - (cx - tx) * factor;
  ty = cy - (cy - ty) * factor;
  scale *= factor;
  applyTransform();
}

function resetView() { scale = 0.55; tx = 60; ty = 20; applyTransform(); }

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  tx = mx - (mx - tx) * factor;
  ty = my - (my - ty) * factor;
  scale *= factor;
  applyTransform();
}, { passive: false });

wrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  panning = true;
  startX = e.clientX; startY = e.clientY;
  startTx = tx; startTy = ty;
  wrap.classList.add('panning');
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { panning = false; wrap.classList.remove('panning'); });

// Tooltip
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.node-group').forEach(g => {
  const id = g.dataset.id;
  if (!id || !nodeData[id]) return;
  const d = nodeData[id];
  g.addEventListener('mouseenter', e => {
    tooltip.innerHTML = `<strong>${d.title}</strong>${d.desc}<div class="path">${d.path}</div>`;
    tooltip.style.display = 'block';
  });
  g.addEventListener('mousemove', e => {
    const x = e.clientX + 14, y = e.clientY + 14;
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    tooltip.style.left = (x + tw > window.innerWidth  ? x - tw - 28 : x) + 'px';
    tooltip.style.top  = (y + th > window.innerHeight ? y - th - 28 : y) + 'px';
  });
  g.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
});
</script>
